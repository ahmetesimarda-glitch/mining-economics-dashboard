# Railway / Nixpacks — system Chromium for Puppeteer PDF export.
# @sparticuz/chromium is Lambda-only and fails here (missing libnspr4.so).

[phases.setup]
aptPkgs = ["chromium", "fonts-liberation", "ca-certificates"]

[variables]
PUPPETEER_EXECUTABLE_PATH = "/usr/bin/chromium"
PUPPETEER_SKIP_DOWNLOAD = "true"
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
