# Railway / Nixpacks — system Chromium for Puppeteer PDF export.
# @sparticuz/chromium is Lambda-only and fails here (missing libnspr4.so).
# Explicit runtime libs: Chromium's apt deps are not always pulled reliably via aptPkgs alone.

[phases.setup]
aptPkgs = [
  "chromium",
  "ca-certificates",
  "fonts-liberation",
  "libnspr4",
  "libnss3",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libgbm1",
  "libgtk-3-0",
  "libx11-6",
  "libx11-xcb1",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "libcups2",
  "libasound2",
  "libdrm2",
  "libxcursor1",
  "libxi6",
  "libxss1",
  "libxtst6",
  "libappindicator3-1",
  "xdg-utils",
]

[variables]
PUPPETEER_EXECUTABLE_PATH = "/usr/bin/chromium"
PUPPETEER_SKIP_DOWNLOAD = "true"
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
